<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OFFv1 · Offseason Rank Index — RB Leipzig</title>
<script src="https://unpkg.com/lightweight-charts@5.0.8/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#0b0d10; --panel:#13161b; --panel2:#171b21; --bd:#242a31; --bd2:#2e3640;
  --tx:#e7eaef; --mut:#8b93a0; --dim:#5c6571;
  --grn:#B2ED68; --red:#E0466A; --cyan:#35d0c4; --gold:#F5C451;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);-webkit-font-smoothing:antialiased}
#app{max-width:1180px;margin:0 auto;padding:18px 18px 28px}

/* ---------- header ---------- */
.head{display:flex;align-items:stretch;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.idblk{min-width:210px}
.team{font-size:23px;font-weight:680;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}
.badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--cyan);
  border:1px solid color-mix(in srgb,var(--cyan) 45%,transparent);border-radius:5px;padding:2px 6px;background:color-mix(in srgb,var(--cyan) 9%,transparent)}
.sub{color:var(--mut);font-size:12.5px;margin-top:3px}
.spacer{flex:1}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:11px;padding:10px 14px;min-width:128px;display:flex;flex-direction:column;justify-content:center}
.card .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.7px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.card .big{font-size:21px;font-weight:680;font-variant-numeric:tabular-nums;line-height:1.05}
.card .big.sm{font-size:17px}
.card .note{font-size:11px;color:var(--mut);margin-top:3px;font-variant-numeric:tabular-nums}
.up{color:var(--grn)} .down{color:var(--red)} .cy{color:var(--cyan)} .gd{color:var(--gold)}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;border-radius:999px;padding:2px 9px;width:max-content}
.chip.cl{color:var(--gold);background:color-mix(in srgb,var(--gold) 13%,transparent);border:1px solid color-mix(in srgb,var(--gold) 35%,transparent)}
.chip.out{color:var(--mut);background:#1c2128;border:1px solid var(--bd2)}

/* ---------- toolbar ---------- */
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
.group{display:flex;gap:2px;background:var(--panel);border:1px solid var(--bd);border-radius:9px;padding:3px}
.tool{font-family:var(--mono);font-size:11.5px;color:var(--mut);background:transparent;border:0;border-radius:6px;
  padding:5px 11px;cursor:pointer;white-space:nowrap;transition:.12s}
.tool:hover{color:var(--tx);background:#1c222a}
.tool.on{color:#0b0d10;background:var(--grn);font-weight:600}
.tool.on.cyk{background:var(--cyan)}
.barlab{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;margin-right:2px}

/* ---------- chart ---------- */
.wrap{position:relative;background:var(--panel);border:1px solid var(--bd);border-radius:13px;overflow:hidden}
#chart{height:460px}
#tip{position:absolute;pointer-events:none;z-index:6;background:rgba(13,16,20,.93);border:1px solid var(--bd2);
  border-radius:9px;padding:9px 11px;font-size:12px;min-width:150px;opacity:0;transition:opacity .08s;backdrop-filter:blur(7px)}
#tip .d{font-family:var(--mono);font-size:10px;color:var(--mut);margin-bottom:5px}
#tip .row{display:flex;justify-content:space-between;gap:18px;line-height:1.55}
#tip .k{color:var(--mut)} #tip .v{font-variant-numeric:tabular-nums;font-weight:600}

/* ---------- rivals rail ---------- */
.rail{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
.rv{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--panel);border:1px solid var(--bd);
  border-radius:7px;padding:4px 8px;display:flex;gap:7px;align-items:baseline}
.rv b{color:var(--tx);font-weight:600}
.rv .p{color:var(--dim)}
.rv.me{border-color:color-mix(in srgb,var(--cyan) 55%,transparent);background:color-mix(in srgb,var(--cyan) 8%,transparent)}
.rv.me b{color:var(--cyan)}
.foot{color:var(--dim);font-size:11px;line-height:1.6;margin-top:14px}
.foot b{color:var(--mut);font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <div class="idblk">
      <div class="team" id="team">RB Leipzig <span class="badge">OFFv1</span></div>
      <div class="sub" id="sub">Bundesliga · 2026-27 offseason</div>
      <div style="margin-top:8px" id="clchip"></div>
    </div>
    <div class="spacer"></div>
    <div class="card">
      <div class="lab">Index price</div>
      <div class="big" id="px">—</div>
      <div class="note" id="pxchg">—</div>
    </div>
    <div class="card">
      <div class="lab">Implied finish</div>
      <div class="big" id="fin">—</div>
      <div class="note" id="finnote">—</div>
    </div>
    <div class="card">
      <div class="lab">Market input</div>
      <div class="big sm" id="mkt">—</div>
      <div class="note" id="mktnote">—</div>
    </div>
    <div class="card">
      <div class="lab">Season kickoff</div>
      <div class="big sm" id="kick">—</div>
      <div class="note" id="kicknote">—</div>
    </div>
  </div>

  <div class="bar">
    <span class="barlab">Type</span>
    <div class="group" id="ctype">
      <button class="tool" data-t="area">Area</button>
      <button class="tool on" data-t="line">Line</button>
      <button class="tool" data-t="step">Step</button>
    </div>
    <span class="barlab" style="margin-left:6px">View</span>
    <div class="group" id="view">
      <button class="tool on" data-v="ladder" title="Show the full rank ladder (where you sit vs CL/Europa)">Ladder</button>
      <button class="tool" data-v="drift" title="Zoom into the day-to-day repricing">Drift</button>
    </div>
    <div class="group">
      <button class="tool" id="t-rungs" title="Toggle rank rungs">Rungs ✓</button>
      <button class="tool" id="t-fit" title="Reset zoom">Fit</button>
    </div>
  </div>

  <div class="wrap">
    <div id="chart"></div>
    <div id="tip"></div>
  </div>

  <div class="rail" id="rail"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const { createChart, LineSeries, AreaSeries, LineStyle, LineType } = LightweightCharts;

const F = (n,d=2)=>n==null?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const ord = n => { const r=Math.round(n); const s=["th","st","nd","rd"], v=r%100; return r+(s[(v-20)%10]||s[v]||s[0]); };
const tsec = iso => Math.floor(new Date(iso).getTime()/1000);

let D, A, K, CB, AR, PP, KICK_T, NOW_T, series, chart, ladderMode=true, showRungs=true, chartType="line", priceLines=[], CLEAN, DMIN, DMAX;

// ---- ladder math (single source of truth) ----
const usdFromRank = r => Math.exp(K*(CB+(AR-r)*PP));
const rankFromUsd = u => AR - ((Math.log(u)/K)-CB)/PP;

boot();
async function boot(){
  D = await (await fetch("off-leipzig.json?_="+Date.now())).json();
  A=D.anchor; K=A.k_usd; CB=A.carry_b; AR=A.anchor_rank; PP=A.per_place_idx;
  KICK_T=tsec(D.kickoff);
  const last=D.series[D.series.length-1], first=D.series[0];
  NOW_T=tsec(last.t);

  // header
  document.getElementById("team").firstChild.textContent = D.team+" ";
  document.getElementById("sub").textContent = `${D.league_label} · ${D.season} offseason`;
  const px=last.usd, fin=rankFromUsd(px), clPx=usdFromRank(4);
  document.getElementById("px").textContent = "$"+F(px);
  const chg=px-first.usd, chgp=100*chg/first.usd;
  document.getElementById("pxchg").innerHTML = `<span class="${chg>=0?'up':'down'}">${chg>=0?'+':''}${F(chg)} (${chg>=0?'+':''}${F(chgp,1)}%)</span> · since ${first.t.slice(0,10)}`;
  document.getElementById("fin").textContent = ord(fin);
  document.getElementById("finnote").textContent = `price implies ${F(fin,1)} · anchor ${F(AR,1)}`;
  const mc=D.consensus_now;
  document.getElementById("mkt").textContent = `${F(mc.title_prob*100,1)}% title`;
  document.getElementById("mktnote").textContent = `${mc.books} sharp books · rank ${F(mc.board_rank,1)}`;
  const days=Math.max(0,Math.round((KICK_T-NOW_T)/86400));
  const kd=new Date(D.kickoff);
  document.getElementById("kick").textContent = "~"+days+"d";
  document.getElementById("kicknote").textContent = kd.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" first ball";
  // CL-line chip
  const onLine = Math.abs(fin-4) < 0.35;
  const cc=document.getElementById("clchip");
  if(fin<=4) cc.innerHTML=`<span class="chip cl">◆ In the top-4 · Champions League</span>`;
  else if(onLine) cc.innerHTML=`<span class="chip cl">◆ On the CL line — ${F(fin-4,1)} outside top-4</span>`;
  else cc.innerHTML=`<span class="chip out">○ ${ord(fin)} · outside the CL places</span>`;

  buildChart();
  buildRail(fin);
  buildFoot();
}

function buildChart(){
  chart = createChart(document.getElementById("chart"), {
    autoSize:true,
    layout:{ background:{color:"transparent"}, textColor:"#8b93a0", fontFamily:"ui-monospace,Menlo,monospace", attributionLogo:false },
    grid:{ vertLines:{color:"rgba(255,255,255,.03)"}, horzLines:{color:"rgba(255,255,255,.03)"} },
    rightPriceScale:{ borderColor:"#242a31", scaleMargins:{top:.12,bottom:.12} },
    timeScale:{ borderColor:"#242a31", timeVisible:false, secondsVisible:false, rightOffset:6 },
    crosshair:{ mode:0,
      vertLine:{color:"rgba(53,208,196,.45)",width:1,style:0,labelBackgroundColor:"#13161b"},
      horzLine:{color:"rgba(255,255,255,.18)",width:1,style:2,labelBackgroundColor:"#13161b"} },
    handleScale:{axisPressedMouseMove:{time:true,price:false}},
  });

  const prov = () => ladderMode
    ? { priceRange:{ minValue: usdFromRank(7.6), maxValue: usdFromRank(0.7) } }
    : { priceRange:{ minValue: DMIN, maxValue: DMAX } };

  series = chart.addSeries(AreaSeries, {
    lineColor:"#cfe9a3", lineWidth:2,
    topColor:"rgba(178,237,104,.22)", bottomColor:"rgba(178,237,104,.01)",
    priceLineVisible:false, lastValueVisible:true,
    crosshairMarkerRadius:4, crosshairMarkerBorderColor:"#0b0d10", crosshairMarkerBackgroundColor:"#cfe9a3",
    autoscaleInfoProvider: prov,
  });

  // OFFv1 ticks are event-driven & irregular (sparse daily backfill, dense live). Resample to a
  // uniform 12h grid (last-obs-carried-forward) so bar-index spacing == proportional real time
  // and the long runway to kickoff reads correctly.
  const DT=12*3600;
  const raw=D.series.map(p=>({t:tsec(p.t),v:p.usd})).sort((a,b)=>a.t-b.t);
  const clean=[]; let j=0, lastV=raw[0].v;
  const t0=Math.floor(raw[0].t/DT)*DT, tN=raw[raw.length-1].t;
  for(let t=t0;t<=tN;t+=DT){
    while(j<raw.length && raw[j].t<=t){ lastV=raw[j].v; j++; }
    clean.push({time:t, value:lastV});
  }
  if(clean[clean.length-1].time < tN) clean.push({time:tN, value:raw[raw.length-1].v});
  const lastDataT=clean[clean.length-1].time;
  NOW_T=lastDataT;
  // whitespace runway at the same spacing + an exact kickoff point so its divider lands right
  for(let t=lastDataT+DT;t<KICK_T;t+=DT) clean.push({time:t});
  clean.push({time:KICK_T});
  CLEAN=clean;
  const vals=clean.filter(d=>d.value!=null).map(d=>d.value);
  DMIN=Math.min(...vals); DMAX=Math.max(...vals);
  const pad=Math.max(0.05,(DMAX-DMIN)*0.65); DMIN-=pad; DMAX+=pad;
  series.setData(clean);
  setType(chartType);

  series.attachPrimitive(makeCorridor());
  drawRungs();
  chart.timeScale().fitContent();

  chart.subscribeCrosshairMove(onHover);
}

// ---- rank rungs as horizontal price lines ----
function drawRungs(){
  priceLines.forEach(pl=>series.removePriceLine(pl)); priceLines=[];
  if(!showRungs) return;
  for(let r=1;r<=7;r++){
    const cl = (r===4);
    priceLines.push(series.createPriceLine({
      price: usdFromRank(r),
      color: cl ? "rgba(245,196,81,.85)" : "rgba(120,131,146,.34)",
      lineWidth: cl?1:1, lineStyle: cl?LineStyle.Solid:LineStyle.Dotted,
      axisLabelVisible:true,
      title: cl ? `P4 · CL line` : `P${r}`,
    }));
  }
}

// ---- corridor (runway to kickoff) + dividers, drawn in bitmap space ----
function makeCorridor(){
  let api=null;
  const draw = target => { if(!api) return; target.useBitmapCoordinateSpace(scope=>{
    const ctx=scope.context, hpr=scope.horizontalPixelRatio, vpr=scope.verticalPixelRatio;
    const ts=api.chart.timeScale();
    const xNow=ts.timeToCoordinate(NOW_T), xKick=ts.timeToCoordinate(KICK_T);
    const H=scope.bitmapSize.height, W=scope.bitmapSize.width;
    ctx.save();
    // faint runway tint between now and kickoff
    if(xNow!=null && xKick!=null){
      ctx.fillStyle="rgba(53,208,196,.045)";
      ctx.fillRect(xNow*hpr,0,(xKick-xNow)*hpr,H);
    }
    // now divider
    if(xNow!=null){
      ctx.strokeStyle="rgba(255,255,255,.16)"; ctx.lineWidth=Math.max(1,hpr); ctx.setLineDash([3*hpr,3*hpr]);
      ctx.beginPath(); ctx.moveTo(xNow*hpr,0); ctx.lineTo(xNow*hpr,H); ctx.stroke();
    }
    // kickoff divider + label
    if(xKick!=null){
      ctx.setLineDash([5*hpr,4*hpr]); ctx.strokeStyle="rgba(53,208,196,.8)"; ctx.lineWidth=Math.max(1,hpr);
      ctx.beginPath(); ctx.moveTo(xKick*hpr,0); ctx.lineTo(xKick*hpr,H); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font=`${11*hpr}px ui-monospace,Menlo,monospace`; ctx.fillStyle="rgba(53,208,196,.95)";
      ctx.textAlign="right"; ctx.textBaseline="top";
      ctx.fillText("KICKOFF", (xKick-6)*hpr, 8*vpr);
    }
    ctx.restore();
  });};
  const view={ renderer(){return {draw};}, zOrder(){return "bottom";} };
  return { attached(p){api=p;}, detached(){api=null;}, updateAllViews(){}, paneViews(){return [view];} };
}

// ---- hover tooltip ----
const tip=document.getElementById("tip");
function onHover(param){
  if(!param.time || !param.point){ tip.style.opacity=0; return; }
  const sd = param.seriesData.get(series);
  const v = sd && (sd.value!=null?sd.value:sd.close);
  if(v==null){ // in the runway (no price)
    tip.style.opacity=0; return;
  }
  const r=rankFromUsd(v);
  const dt=new Date(param.time*1000);
  tip.innerHTML = `<div class="d">${dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>`
    + `<div class="row"><span class="k">Index</span><span class="v">$${F(v)}</span></div>`
    + `<div class="row"><span class="k">Implied finish</span><span class="v ${r<=4?'gd':''}">${ord(r)}</span></div>`
    + `<div class="row"><span class="k">vs CL line</span><span class="v ${r<=4?'up':'down'}">${r<=4?'in top-4':F(r-4,1)+' out'}</span></div>`;
  tip.style.opacity=1;
  const wrap=tip.parentElement.getBoundingClientRect();
  let x=param.point.x+16, y=param.point.y-10;
  if(x+170>wrap.width) x=param.point.x-170;
  tip.style.left=x+"px"; tip.style.top=Math.max(6,y)+"px";
}

// ---- rivals rail ----
function buildRail(myFin){
  const el=document.getElementById("rail");
  el.innerHTML = D.rivals.map(rv=>{
    const me = rv.team===D.team;
    return `<div class="rv ${me?'me':''}"><b>${F(rv.rank,1)}</b> ${rv.team.replace(/ München/,'')} <span class="p">$${F(rv.usd,0)}</span></div>`;
  }).join("");
}

function buildFoot(){
  document.getElementById("foot").innerHTML =
    `<b>How to read it.</b> The horizontal rungs are the rank→price ladder for ${D.team}: each line is where the index sits if the market expects that finishing place `
    + `(P4 = the Champions-League cut-off). The price line is the live OFFv1 oracle — it drifts as the market's implied rank moves, built from de-vigged consensus across `
    + `${D.consensus_now.books}+ sharp books + Polymarket/Kalshi. One long corridor runs to kickoff (${new Date(D.kickoff).toLocaleDateString("en-US",{month:"short",day:"numeric"})}); there are no game settlements until then. `
    + `<b>Trade:</b> if you think they finish above the market's implied rank, you're long the rungs above; below, you're short. `
    + `<br><span style="color:#5c6571">Static snapshot · OFFv1 · kickoff date is a known real-world constant (not in the fixtures table yet).</span>`;
}

// ---- controls ----
function setType(t){ chartType=t;
  const fill = t==="area";
  series.applyOptions({
    lineType: t==="step"?LineType.WithSteps:LineType.Simple,
    topColor: fill?"rgba(178,237,104,.22)":"rgba(0,0,0,0)",
    bottomColor: fill?"rgba(178,237,104,.01)":"rgba(0,0,0,0)",
  });
  document.querySelectorAll("#ctype .tool").forEach(x=>x.classList.toggle("on", x.dataset.t===t));
}
document.querySelectorAll("#ctype .tool").forEach(b=>b.onclick=()=>setType(b.dataset.t));
document.querySelectorAll("#view .tool").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#view .tool").forEach(x=>x.classList.remove("on")); b.classList.add("on");
  ladderMode = b.dataset.v==="ladder";
  series.setData(CLEAN); // force autoscale to re-consult the provider
});
document.getElementById("t-rungs").onclick=function(){ showRungs=!showRungs; this.textContent="Rungs "+(showRungs?"✓":"✕"); this.classList.toggle("on",showRungs); drawRungs(); };
document.getElementById("t-fit").onclick=()=>chart.timeScale().fitContent();

addEventListener("resize",()=>chart&&chart.applyOptions({}));
</script>
</body>
</html>
